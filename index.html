<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پرتفولیو | پروژه‌های من</title>
  <style>
    /* reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 1300px;
      width: 100%;
    }

    /* header */
    .header {
      margin-bottom: 3rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #64748b;
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    /* grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    /* card */
    .project-card {
      background: #ffffff;
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #e9edf2;
      display: flex;
      flex-direction: column;
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border-color: #cbd5e1;
    }

    /* thumbnail */
    .card-thumbnail {
      width: 100%;
      height: 200px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #94a3b8;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-thumbnail .emoji-placeholder {
      font-size: 4rem;
      opacity: 0.6;
    }

    /* badge (status) */
    .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* content */
    .card-content {
      padding: 1.5rem 1.5rem 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #0f172a;
      line-height: 1.3;
    }

    .card-title a {
      color: inherit;
      text-decoration: none;
    }

    .card-title a:hover {
      color: #2563eb;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .card-meta .date {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .card-meta .category {
      background: #f1f5f9;
      padding: 0.15rem 0.6rem;
      border-radius: 50px;
      color: #475569;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .card-description {
      font-size: 0.95rem;
      color: #334155;
      line-height: 1.6;
      margin-bottom: 1rem;
      flex: 1;
    }

    /* tags */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .card-tags span {
      background: #f1f5f9;
      color: #475569;
      padding: 0.15rem 0.6rem;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 500;
      border: 1px solid #e9edf2;
    }

    /* links */
    .card-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid #f0f2f5;
      margin-top: auto;
    }

    .card-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.8rem;
      background: #f8fafc;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1e293b;
      text-decoration: none;
      border: 1px solid #e9edf2;
      transition: all 0.15s;
    }

    .card-links a:hover {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      transform: scale(1.02);
    }

    .card-links .link-icon {
      font-size: 0.9rem;
    }

    /* empty & loading */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      background: white;
      border-radius: 1.5rem;
      border: 2px dashed #d4dce6;
    }

    .empty-state .big-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: #64748b;
      font-size: 0.95rem;
    }

    .empty-state code {
      background: #f1f5f9;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* responsive */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .header h1 {
        font-size: 2rem;
      }
      .projects-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .card-thumbnail {
        height: 170px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- header -->
  <div class="header">
    <h1>🚀 پروژه‌های من</h1>
    <p>نمونه کارها و پروژه‌های توسعه‌یافته</p>
  </div>

  <!-- grid -->
  <div id="projectsGrid" class="projects-grid">
    <!-- cards injected by JS -->
  </div>
</div>

<script>
  (function() {
    const grid = document.getElementById('projectsGrid');

    // helper: ساخت کارت
    function createCard(project) {
      const card = document.createElement('div');
      card.className = 'project-card';

      // ------ thumbnail ------
      const thumb = document.createElement('div');
      thumb.className = 'card-thumbnail';

      // اگه تامنیل تصویر داره
      if (project.thumbnail) {
        const img = document.createElement('img');
        img.src = project.thumbnail;
        img.alt = project.title || 'پروژه';
        img.loading = 'lazy';
        thumb.appendChild(img);
      } else {
        // ایموجی به جای تامنیل
        const emoji = document.createElement('span');
        emoji.className = 'emoji-placeholder';
        emoji.textContent = project.emoji || '📁';
        thumb.appendChild(emoji);
      }

      // badge (وضعیت)
      if (project.status) {
        const badge = document.createElement('span');
        badge.className = 'card-badge';
        badge.textContent = project.status;
        thumb.appendChild(badge);
      }

      card.appendChild(thumb);

      // ------ content ------
      const content = document.createElement('div');
      content.className = 'card-content';

      // title (با لینک اختیاری)
      const titleWrapper = document.createElement('div');
      titleWrapper.className = 'card-title';

      if (project.url) {
        const link = document.createElement('a');
        link.href = project.url;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = project.title || 'بدون عنوان';
        titleWrapper.appendChild(link);
      } else {
        titleWrapper.textContent = project.title || 'بدون عنوان';
      }
      content.appendChild(titleWrapper);

      // meta: تاریخ + دسته‌بندی
      const meta = document.createElement('div');
      meta.className = 'card-meta';

      if (project.date) {
        const dateSpan = document.createElement('span');
        dateSpan.className = 'date';
        dateSpan.textContent = `📅 ${project.date}`;
        meta.appendChild(dateSpan);
      }

      if (project.category) {
        const catSpan = document.createElement('span');
        catSpan.className = 'category';
        catSpan.textContent = project.category;
        meta.appendChild(catSpan);
      }

      if (meta.children.length > 0) {
        content.appendChild(meta);
      }

      // description
      if (project.description) {
        const desc = document.createElement('p');
        desc.className = 'card-description';
        desc.textContent = project.description;
        content.appendChild(desc);
      }

      // tags
      if (project.tags && Array.isArray(project.tags) && project.tags.length > 0) {
        const tagsContainer = document.createElement('div');
        tagsContainer.className = 'card-tags';
        project.tags.forEach(tag => {
          const span = document.createElement('span');
          span.textContent = tag;
          tagsContainer.appendChild(span);
        });
        content.appendChild(tagsContainer);
      }

      // links
      const linksContainer = document.createElement('div');
      linksContainer.className = 'card-links';

      const links = project.links || [];

      if (Array.isArray(links) && links.length > 0) {
        links.forEach(link => {
          if (!link) return;

          let href = link;
          let label = link;
          let icon = '🔗';

          if (typeof link === 'object') {
            href = link.url || link.href;
            label = link.label || link.title || href;
            icon = link.icon || '🔗';
          }

          if (href && typeof href === 'string' && href.startsWith('http')) {
            const a = document.createElement('a');
            a.href = href;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';

            const iconSpan = document.createElement('span');
            iconSpan.className = 'link-icon';
            iconSpan.textContent = icon;
            a.appendChild(iconSpan);

            const textSpan = document.createTextNode(' ' + label);
            a.appendChild(textSpan);

            linksContainer.appendChild(a);
          }
        });
      }

      // اگه لینکی نبود، پیام جایگزین
      if (linksContainer.children.length === 0) {
        const empty = document.createElement('span');
        empty.style.cssText = 'color: #94a3b8; font-size: 0.8rem;';
        empty.textContent = '🔗 بدون لینک';
        linksContainer.appendChild(empty);
      }

      content.appendChild(linksContainer);
      card.appendChild(content);

      return card;
    }

    // رندر کردن پروژه‌ها
    function renderProjects(projects) {
      grid.innerHTML = '';

      if (!projects || projects.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="big-icon">📭</div>
            <h3>هیچ پروژه‌ای پیدا نشد</h3>
            <p>فایل <code>projects.json</code> را در کنار این صفحه قرار دهید.</p>
            <p style="margin-top: 0.5rem; font-size: 0.85rem;">
              ساختار کامل: <code>title, description, thumbnail, tags, links, date, category, status, url</code>
            </p>
          </div>
        `;
        return;
      }

      projects.forEach(project => {
        const card = createCard(project);
        grid.appendChild(card);
      });
    }

    // بارگذاری از JSON
    async function loadProjects() {
      try {
        const response = await fetch('projects.json');

        if (!response.ok) {
          renderProjects([]);
          return;
        }

        const data = await response.json();

        // پشتیبانی از آرایه یا آبجکت با کلید projects
        let projects = Array.isArray(data) ? data : data.projects;

        if (!projects || !Array.isArray(projects)) {
          renderProjects([]);
          return;
        }

        renderProjects(projects);
      } catch (error) {
        console.warn('خطا در بارگذاری:', error);
        renderProjects([]);
      }
    }

    loadProjects();
  })();
</script>

</body>
</html>
